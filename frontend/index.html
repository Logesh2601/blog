<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav>
    <div class="nav-inner">
      <a href="/index.html" class="nav-brand">📖 BlogSpace</a>
      <div class="nav-links" id="nav-auth">
        <!-- Rendered by auth.js -->
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <div class="page-header">
      <div>
        <h1>Latest Posts</h1>
        <p class="page-subtitle">Discover stories and ideas from our community.</p>
      </div>
    </div>

    <div id="posts-container">
      <!-- Posts are rendered by index.js -->
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2024 BlogSpace. Built with ❤️</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
