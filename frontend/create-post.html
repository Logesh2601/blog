<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Post — Blog Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav>
    <div class="nav-inner">
      <a href="/index.html" class="nav-brand">📖 BlogSpace</a>
      <div class="nav-links" id="nav-auth">
        <!-- Rendered by auth.js -->
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <a href="/index.html" class="back-link">← Back to all posts</a>

    <div class="page-header">
      <div>
        <h1>Write a New Post</h1>
        <p class="page-subtitle">Share your thoughts with the world.</p>
      </div>
    </div>

    <div class="post-form-card" id="post-form-card">
      <div id="form-alert"></div>

      <form id="post-form" novalidate>
        <div class="form-group">
          <label for="post-title">Title</label>
          <input
            type="text"
            id="post-title"
            class="form-control"
            placeholder="Give your post a compelling title..."
            required
            minlength="3"
          />
        </div>

        <div class="form-group">
          <label for="post-content">Content</label>
          <textarea
            id="post-content"
            class="form-control tall"
            placeholder="Write your post content here..."
            required
            minlength="10"
          ></textarea>
        </div>

        <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
          <button type="submit" class="btn btn-primary" id="submit-btn">
            Publish Post
          </button>
          <a href="/index.html" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2024 BlogSpace. Built with ❤️</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/create-post.js"></script>
</body>
</html>
