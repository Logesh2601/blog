<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Blog Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav>
    <div class="nav-inner">
      <a href="/index.html" class="nav-brand">📖 BlogSpace</a>
      <div class="nav-links" id="nav-auth">
        <!-- Rendered by auth.js -->
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <a href="/index.html" class="back-link">← Back to all posts</a>

    <!-- Post content rendered here -->
    <div id="post-container"></div>

    <!-- Comments rendered here -->
    <div id="comments-container"></div>
  </main>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <h3>Delete Post</h3>
      <p>Are you sure you want to delete this post? This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="delete-cancel-btn">Cancel</button>
        <button class="btn btn-danger" id="delete-confirm-btn">Delete Post</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2024 BlogSpace. Built with ❤️</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/post.js"></script>
</body>
</html>
