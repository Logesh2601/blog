<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Blog Platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav>
    <div class="nav-inner">
      <a href="/index.html" class="nav-brand">📖 BlogSpace</a>
      <div class="nav-links" id="nav-auth">
        <!-- Rendered by auth.js -->
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container-narrow">
    <div class="auth-card">
      <div class="auth-card-header">
        <h1>Welcome Back</h1>
        <p>Login to your BlogSpace account.</p>
      </div>

      <div id="login-alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Your password"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
          Login
        </button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="/register.html">Register here</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2024 BlogSpace. Built with ❤️</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (auth.isLoggedIn()) {
        const redirect = getQueryParam('redirect');
        window.location.href = redirect || '/index.html';
        return;
      }
      auth.renderNav();
      setupLoginForm();
    });

    function setupLoginForm() {
      const form = document.getElementById('login-form');
      const submitBtn = document.getElementById('submit-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert('login-alert');

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email) {
          showAlert('login-alert', 'Email is required.');
          return;
        }

        if (!password) {
          showAlert('login-alert', 'Password is required.');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner spinner-sm"></span> Logging in...';

        try {
          const data = await api.login(email, password);
          auth.setAuth(data.token, data.user);

          const redirect = getQueryParam('redirect');
          window.location.href = redirect || '/index.html';
        } catch (err) {
          showAlert('login-alert', err.message || 'Login failed. Please check your credentials.');
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Login';
        }
      });
    }
  </script>
</body>
</html>
